<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORM</title>
    <link rel="stylesheet" href="bootstrap.min.css">
</head>
<body>
<div class="container">
  <div class="text-center mt-5">
    <h1>REGISTRATION FORM</h1>
  </div>
<div class="row justify-content-center align-item-center " >
  <div class="col-6 mt-5  pt-5">
  <form >
    <div class="mb-3">
      <label for="exampleInputEmail1" class="form-label fw-bold ">Enter Your Name</label>
      <input type="email" class="form-control "  id="exampleInputEmail1" aria-describedby="emailHelp">
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1" class="form-label fw-bold">Email</label>
      <input type="email" class="form-control" id="exampleInputPassword1">
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1" class="form-label fw-bold">Phone</label>
      <input type="number" class="form-control " id="exampleInputPassword1">
    </div>
    <div class="mb-3">
      <label for="exampleInputPassword1" class="form-label fw-bold">Password</label>
      <input type="password" class="form-control " id="exampleInputPassword1">
    </div>
    <div class="mb-3 form-check">
      <input type="checkbox" class="form-check-input fw-bold" id="exampleCheck1">
      <label class="form-check-label" for="exampleCheck1">Check me out</label>
    </div>
    <button type="submit" class="btn btn-primary">Submit</button>
    <button type="submit" class="btn btn-success">Login</button>
  </form>
</div>
</div>
 
</div>
</body>
<script src="bootstrap.bundle.min.js"></script>
</html>
