<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Carousel</title>
    <link rel="stylesheet" href="bootstrap.min.css">
</head>
<body>
     <div class="container-fluid  ">
        <div id="carouselExample" class="carousel slide">
            <div class="carousel-inner">
              <div class="carousel-item active">
                <img src="https://cdni.autocarindia.com/utils/ImageResizer.ashx?n=https://cms.haymarketindia.net/model/uploads/modelimages/Hyundai-Creta-180120241405.jpg&w=872&h=578&q=75&c=1" class="d-block w-100" alt="...">
                <h1 class="text-dark">CRETA</h1>
              </div>
              <div class="carousel-item">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR4dJOyYVO0ztzqcrgzAZDWWYUV3kCAvfbaSA&s" class="d-block w-100" alt="...">
                <h1 class="text-dark">AUDI</h1>
              </div>
              <div class="carousel-item">
                <img src="https://bsmedia.business-standard.com/_media/bs/img/article/2023-01/23/full/1674467075-3435.jpg?im=FeatureCrop,size=(826,465)" class="d-block w-100" alt="...">
                <h1 class="text-dark">KIA</h1>
              </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Next</span>
            </button>
          </div>
     </div>
</body>
<script src="bootstrap.bundle.min.js"></script>
</html>
